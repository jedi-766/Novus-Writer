<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Monochrome version - optimized for single-color usage -->
  
  <!-- Document -->
  <g>
    <!-- Main paper body -->
    <path d="M140 100 L372 100 L372 412 L140 412 Z" fill="currentColor"/>
    
    <!-- Folded corner -->
    <path d="M372 100 L372 148 L324 148 Z" fill="currentColor" opacity="0.7"/>
  </g>
  
  <!-- Letter N -->
  <text x="256" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="140" font-weight="700" fill="currentColor" text-anchor="middle">N</text>
  
  <!-- Fountain Pen -->
  <g transform="rotate(-35 320 340)">
    <!-- Pen body -->
    <rect x="280" y="320" width="16" height="100" rx="8" fill="currentColor"/>
    
    <!-- Pen cap accent -->
    <rect x="278" y="315" width="20" height="12" rx="4" fill="currentColor" opacity="0.8"/>
    
    <!-- Pen nib holder -->
    <rect x="279" y="418" width="18" height="10" rx="2" fill="currentColor"/>
    
    <!-- Pen nib -->
    <path d="M282 428 L294 428 L296 455 L280 455 Z" fill="currentColor" opacity="0.6"/>
  </g>
</svg>
