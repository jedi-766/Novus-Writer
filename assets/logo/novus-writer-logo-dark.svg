<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="darkBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A202C;stop-opacity:1" />
    </linearGradient>
    
    <!-- Document shadow for dark theme -->
    <filter id="darkDocShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Pen shadow for dark theme -->
    <filter id="darkPenShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- N shadow for dark theme -->
    <filter id="darkNShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Paper fold gradient for dark theme -->
    <linearGradient id="darkFoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3748;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pen body gradient for dark theme -->
    <linearGradient id="darkPenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4299E1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#63B3ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4299E1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background (rounded square) -->
  <rect x="8" y="8" width="496" height="496" rx="120" ry="120" fill="url(#darkBgGradient)"/>
  
  <!-- Document -->
  <g filter="url(#darkDocShadow)">
    <!-- Main paper body -->
    <path d="M140 100 L372 100 L372 412 L140 412 Z" fill="#E2E8F0"/>
    
    <!-- Folded corner -->
    <path d="M372 100 L372 148 L324 148 Z" fill="url(#darkFoldGradient)"/>
    
    <!-- Paper thickness edge -->
    <path d="M372 148 L324 148 L324 100 Z" fill="#CBD5E0"/>
    
    <!-- Text lines on document -->
    <g opacity="0.4">
      <rect x="170" y="160" width="172" height="4" rx="2" fill="#4A5568"/>
      <rect x="170" y="180" width="172" height="4" rx="2" fill="#4A5568"/>
      <rect x="170" y="200" width="172" height="4" rx="2" fill="#4A5568"/>
      <rect x="170" y="220" width="140" height="4" rx="2" fill="#4A5568"/>
    </g>
  </g>
  
  <!-- Letter N -->
  <g filter="url(#darkNShadow)">
    <text x="256" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="140" font-weight="700" fill="#4299E1" text-anchor="middle">N</text>
  </g>
  
  <!-- Fountain Pen -->
  <g filter="url(#darkPenShadow)" transform="rotate(-35 320 340)">
    <!-- Pen body -->
    <rect x="280" y="320" width="16" height="100" rx="8" fill="url(#darkPenGradient)"/>
    
    <!-- Pen cap accent -->
    <rect x="278" y="315" width="20" height="12" rx="4" fill="#A0AEC0"/>
    
    <!-- Pen nib holder -->
    <rect x="279" y="418" width="18" height="10" rx="2" fill="#2B6CB0"/>
    
    <!-- Pen nib -->
    <path d="M282 428 L294 428 L296 455 L280 455 Z" fill="#E2E8F0"/>
    
    <!-- Nib slit -->
    <line x1="288" y1="430" x2="288" y2="452" stroke="#4A5568" stroke-width="1"/>
    
    <!-- Nib decoration -->
    <circle cx="288" cy="425" r="2" fill="#2B6CB0"/>
  </g>
  
  <!-- Subtle highlight on document -->
  <ellipse cx="200" cy="180" rx="80" ry="40" fill="#FFFFFF" opacity="0.15"/>
</svg>
