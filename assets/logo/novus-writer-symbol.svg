<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Symbol-only version (no text) - for favicon and small sizes -->
  
  <defs>
    <!-- Background gradient -->
    <linearGradient id="symbolBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Document shadow -->
    <filter id="symbolDocShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    
    <!-- Pen shadow -->
    <filter id="symbolPenShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Paper fold gradient -->
    <linearGradient id="symbolFoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1D5DB;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pen body gradient -->
    <linearGradient id="symbolPenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#163A8C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E4FBF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163A8C;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pen nib gradient -->
    <linearGradient id="symbolNibGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9CED6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A5AD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background (rounded square) -->
  <rect x="8" y="8" width="496" height="496" rx="120" ry="120" fill="url(#symbolBgGradient)"/>
  
  <!-- Document -->
  <g filter="url(#symbolDocShadow)">
    <!-- Main paper body -->
    <path d="M140 100 L372 100 L372 412 L140 412 Z" fill="#FFFFFF"/>
    
    <!-- Folded corner -->
    <path d="M372 100 L372 148 L324 148 Z" fill="url(#symbolFoldGradient)"/>
    
    <!-- Paper thickness edge -->
    <path d="M372 148 L324 148 L324 100 Z" fill="#E5E7EB"/>
    
    <!-- Simplified text lines -->
    <g opacity="0.3">
      <rect x="170" y="160" width="172" height="4" rx="2" fill="#3A3A3A"/>
      <rect x="170" y="180" width="172" height="4" rx="2" fill="#3A3A3A"/>
      <rect x="170" y="200" width="172" height="4" rx="2" fill="#3A3A3A"/>
      <rect x="170" y="220" width="140" height="4" rx="2" fill="#3A3A3A"/>
    </g>
  </g>
  
  <!-- Fountain Pen -->
  <g filter="url(#symbolPenShadow)" transform="rotate(-35 320 340)">
    <!-- Pen body -->
    <rect x="280" y="320" width="16" height="100" rx="8" fill="url(#symbolPenGradient)"/>
    
    <!-- Pen cap accent -->
    <rect x="278" y="315" width="20" height="12" rx="4" fill="#C9CED6"/>
    
    <!-- Pen nib holder -->
    <rect x="279" y="418" width="18" height="10" rx="2" fill="#163A8C"/>
    
    <!-- Pen nib -->
    <path d="M282 428 L294 428 L296 455 L280 455 Z" fill="url(#symbolNibGradient)"/>
    
    <!-- Nib slit -->
    <line x1="288" y1="430" x2="288" y2="452" stroke="#3A3A3A" stroke-width="1"/>
    
    <!-- Nib decoration -->
    <circle cx="288" cy="425" r="2" fill="#163A8C"/>
  </g>
</svg>
